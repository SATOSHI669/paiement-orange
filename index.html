<!DOCTYPE html>
<html>
<head>
    <title>Paiement Orange Money</title>
</head>
<body>
    <h1>Finaliser votre paiement</h1>
    <p>Montant : 10 FCFA (test)</p>
    <button onclick="lancerPaiement()">Payer avec Orange Money</button>

    <script>
    async function lancerPaiement() {
        try {
            // Appelle ton service sur Render
            const response = await fetch("https://paiement-orange.onrender.com/payer.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    amount: "1000",      // 10 FCFA (en centimes)
                    currency: "XOF"
                })
            });
            
            const result = await response.json();
            
            // Vérifie si PawaPay a retourné une URL de redirection
            if (result.http_code === 201 && result.reponse_pawapay?.redirectUrl) {
                // Redirige le client vers la page de paiement PawaPay
                window.location.href = result.reponse_pawapay.redirectUrl;
            } else {
                // Affiche un message d'erreur détaillé
                alert("Erreur : " + JSON.stringify(result));
            }
        } catch (error) {
            alert("Erreur de connexion : " + error.message);
        }
    }
    </script>
</body>
</html>
