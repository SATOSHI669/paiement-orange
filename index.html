<!DOCTYPE html>
<html>
<head>
    <title>Paiement Orange Money</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .price-tag {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 50px;
            margin: 25px 0;
            font-size: 32px;
            font-weight: bold;
            color: #ff7e5f;
        }
        
        .price-tag small {
            font-size: 16px;
            color: #777;
            font-weight: normal;
        }
        
        button {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 10px 20px rgba(255, 126, 95, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 126, 95, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .security-badge {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        
        .security-badge i {
            font-style: normal;
            background-color: #e0e0e0;
            padding: 3px 8px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Finaliser votre paiement</h1>
        <p style="color: #666;">Commande #OM-12345</p>
        
        <div class="price-tag">
            10 <small>FCFA</small>
        </div>
        
        <button onclick="lancerPaiement()">
            Payer avec Orange Money
        </button>
        
        <div class="security-badge">
            <i>🔒 Paiement sécurisé par PawaPay</i>
        </div>
    </div>

    <script>
    async function lancerPaiement() {
        try {
            const response = await fetch("https://paiement-orange.onrender.com/payer.php", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    amount: "1000",
                    currency: "XOF"
                })
            });
            
            const result = await response.json();
            
            if (result.http_code === 201 && result.reponse_pawapay?.redirectUrl) {
                window.location.href = result.reponse_pawapay.redirectUrl;
            } else {
                alert("Erreur : " + JSON.stringify(result));
            }
        } catch (error) {
            alert("Erreur de connexion : " + error.message);
        }
    }
    </script>
</body>
</html>
